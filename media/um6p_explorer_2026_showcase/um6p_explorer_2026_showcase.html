<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>Khalid BARKAN - UM6P Explorer 2026 Showcase</title>

  <meta name="twitter:card" content="summary_large_image">

  <meta name="twitter:description" content="Photos and moments from the UM6P Explorer 2026 Showcase. Panels, people, and tech highlights.">
  <meta name="twitter:image" content="https://barkancorner.me/media/um6p_explorer_2026_showcase/8.jpg">

  <link rel="stylesheet" href="../front_logic/styles.css">
  <style>
    body {
      background: var(--bg-primary);
      padding: 0;
      margin: 0;
    }
    .gallery-page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 24px 60px 24px;
    }
    .gallery-nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--border-1);
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .nav-home {
      font-family: "Courier New", Courier, monospace;
      font-size: 14px;
      color: var(--accent-cyan);
      text-decoration: none;
      letter-spacing: 1px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .nav-home:hover { color: var(--accent-yellow); }
    .theme-toggle-simple {
      cursor: pointer;
      background: var(--bg-card);
      border: 1px solid var(--border-1);
      padding: 6px 12px;
      font-family: "Courier New", Courier, monospace;
      font-size: 12px;
      color: var(--text-dim);
      transition: 0.1s;
    }
    .theme-toggle-simple:hover {
      color: var(--accent-green);
      border-color: var(--accent-green);
    }
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }
    .gallery-item {
      background: var(--bg-card);
      border: 1px solid var(--border-2);
      transition: transform 0.15s ease, border-color 0.15s;
      overflow: hidden;
      position: relative;
    }
    .gallery-item:hover {
      border-color: var(--accent-cyan);
      transform: translateY(-3px);
    }
    .gallery-item a {
      display: block;
      text-decoration: none;
    }
    .gallery-item img {
      width: 100%;
      aspect-ratio: 4 / 3;
      object-fit: cover;
      display: block;
      filter: grayscale(15%);
      transition: filter 0.2s;
    }
    .gallery-item:hover img { filter: grayscale(0%); }
    .image-caption {
      padding: 8px 10px;
      font-size: 11px;
      color: var(--text-faint);
      text-align: center;
      border-top: 1px solid var(--border-3);
      font-family: monospace;
      letter-spacing: 0.5px;
    }
    .gallery-header h1 {
      font-size: 22px;
      letter-spacing: 2px;
      color: var(--accent-green);
      margin-bottom: 8px;
    }
    .gallery-header p {
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 8px;
    }
    hr { margin: 24px 0; border-color: var(--border-3); }
    .footer-note {
      text-align: center;
      margin-top: 48px;
      color: var(--text-ghost);
      font-size: 11px;
      border-top: 1px solid var(--border-3);
      padding-top: 24px;
    }

    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.88);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      cursor: zoom-out;
    }
    #lightbox.active { display: flex; }
    #lightbox img {
      max-width: 92vw;
      max-height: 92vh;
      object-fit: contain;
      box-shadow: 0 0 40px rgba(0,0,0,0.6);
    }
    #lightbox-close {
      position: fixed;
      top: 18px;
      right: 24px;
      color: #fff;
      font-size: 28px;
      cursor: pointer;
      font-family: monospace;
      opacity: 0.7;
      line-height: 1;
    }
    #lightbox-close:hover { opacity: 1; }
  </style>
</head>
<body>

<div class="gallery-page">
  <div class="gallery-nav">
    <a href="../index.html" class="nav-home">[ HOME ]</a>
    <button id="theme-toggle-btn" class="theme-toggle-simple">[ DARK / LIGHT ]</button>
  </div>

  <div class="gallery-header">
    <h1>UM6P Explorer 2026 Showcase</h1>
    <p> Benguerir Morocco | May 8th | moments, panels, people & tech</p>
  </div>

  <div id="gallery-container" class="gallery-grid">
    <div style="text-align:center;padding:40px;color:var(--text-muted);">loading gallery ...</div>
  </div>

  <div class="footer-note">
    Moments from the event — click any image to view full size
  </div>
</div>

<div id="lightbox">
  <span id="lightbox-close">✕</span>
  <img id="lightbox-img" src="" alt="Full size photo">
</div>

<script>
  const localImages = [
    "um6p_explorer_2026_showcase/1.jpg",
    "um6p_explorer_2026_showcase/2.jpg",
    "um6p_explorer_2026_showcase/3.jpg",
    "um6p_explorer_2026_showcase/4.jpg",
    "um6p_explorer_2026_showcase/5.jpg",
    "um6p_explorer_2026_showcase/6.jpeg",
    "um6p_explorer_2026_showcase/7.jpeg",
    "um6p_explorer_2026_showcase/8.jpeg",
    "um6p_explorer_2026_showcase/9.jpeg",
    "um6p_explorer_2026_showcase/10.jpeg",
    "um6p_explorer_2026_showcase/11.jpeg",
    "um6p_explorer_2026_showcase/12.jpeg",
    "um6p_explorer_2026_showcase/13.jpeg",
  ];

  function shuffleArray(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function renderGallery() {
    const container = document.getElementById('gallery-container');
    if (!container) return;

    const shuffled = shuffleArray(localImages);
    let html = '';

    for (const src of shuffled) {
      const label = src.split('/').pop(); // e.g. "1.jpg"
      html += `
        <div class="gallery-item">
          <a class="lightbox-trigger" href="${src}" data-src="${src}">
            <img src="${src}" alt="UM6P Explorer 2026 Showcase moment" loading="lazy"
                 onerror="this.parentElement.parentElement.style.display='none'">
            <div class="image-caption">[ ${label} ]</div>
          </a>
        </div>
      `;
    }

    container.innerHTML = html;
    attachLightbox();
  }

  function attachLightbox() {
    const lightbox   = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');
    const closeBtn   = document.getElementById('lightbox-close');

    document.querySelectorAll('.lightbox-trigger').forEach(link => {
      link.addEventListener('click', e => {
        e.preventDefault();
        lightboxImg.src = link.dataset.src;
        lightbox.classList.add('active');
      });
    });

    const close = () => {
      lightbox.classList.remove('active');
      lightboxImg.src = '';
    };

    closeBtn.addEventListener('click', close);
    lightbox.addEventListener('click', e => {
      if (e.target === lightbox) close();
    });
    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') close();
    });
  }

  function initTheme() {
    const btn = document.getElementById('theme-toggle-btn');
    if (!btn) return;

    const applyTheme = (isLight) => {
      document.body.classList.toggle('light', isLight);
      localStorage.setItem('gallery-theme', isLight ? 'light' : 'dark');
    };

    const saved = localStorage.getItem('gallery-theme');
    if (saved) {
      applyTheme(saved === 'light');
    } else {
      applyTheme(window.matchMedia('(prefers-color-scheme: light)').matches);
    }

    btn.addEventListener('click', () => {
      applyTheme(!document.body.classList.contains('light'));
    });
  }

  renderGallery();
  initTheme();
</script>
</body>
</html>
